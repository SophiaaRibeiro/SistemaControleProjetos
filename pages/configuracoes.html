<!DOCTYPE html>
<html>

<head>

<title>Configurações</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="user">
<div class="avatar"></div>
<p>Usuário</p>
</div>

<a href="projetos.html">Projetos</a>
<a href="kanban.html">Tarefas</a>
<a href="dashboard.html">Dashboard</a>
<a href="prazo.html">Prazos</a>
<a class="active" href="configuracoes.html">Configurações</a>

</div>

<div class="main">

<div class="topbar">
<h2>Configurações</h2>
</div>

<div class="content" style="display:flex; gap:30px; flex-wrap:wrap;">

<!-- DADOS -->

<div class="form-box">

<h3>Perfil</h3>

<input type="text" placeholder="Nome">

<input type="email" placeholder="Email">

<button>Salvar</button>

</div>

<!-- SENHA -->

<div class="form-box">

<h3>Alterar Senha</h3>

<input type="password" placeholder="Senha atual">

<input type="password" placeholder="Nova senha">

<input type="password" placeholder="Confirmar senha">

<button>Atualizar</button>

</div>

<!-- NOTIFICAÇÕES -->

<div class="form-box">

<h3>Notificações</h3>

<label>
<input type="checkbox"> Receber alertas de prazo
</label>

<br>

<label>
<input type="checkbox"> Receber email de tarefas
</label>

<br><br>

<button>Salvar</button>

</div>

<!-- TEMA -->

<div class="form-box">

<h3>Tema</h3>

<select>

<option>Claro</option>
<option>Escuro</option>

</select>

<button>Aplicar</button>

</div>

<!-- EXCLUIR -->

<div class="form-box">

<h3>Conta</h3>

<p>Excluir sua conta permanentemente</p>

<button style="background:#e74c3c;color:white;">
Excluir conta
</button>

<h3>Sessão</h3>

<p>Sair da sua conta no sistema</p>

<button class="btn-primary"
onclick="logout()">

Logout

</button>
</div>

</div>

</div>

</div>

</div>
<script src="../js/projetos.js"></script>
</body>

</html>
