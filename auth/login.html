<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="../css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="auth-layout">

<div class="auth-left">

<h1>Controle de Projetos</h1>

<p>
Organize seus projetos, tarefas e prazos em um só lugar.
</p>

</div>

<div class="auth-right">

<div class="auth-form">

<h2>Login</h2>

<p>Entre para acessar o sistema</p>

<input id="email" type="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button class="btn-primary" onclick="login()">
Entrar
</button>


<br><br>

<a href="recuperar-senha.html">Esqueceu sua senha?</a>

<br><br>

<p style="font-size:13px">Não possui conta?</p>

<button class="btn-secondary"
onclick="window.location.href='cadastroLogin.html'">
Criar conta
</button>

</div>

</div>

</div>
<script src="../js/projetos.js"></script>
</body>

</html>
